<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享邮箱池</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 80px; background: #f5f5f5; }
        #emailDisplay { font-size: 24px; font-weight: bold; margin: 30px; padding: 20px; border: 2px dashed #4CAF50; display: inline-block; min-width: 250px; background: white; border-radius: 8px; }
        button { font-size: 18px; padding: 10px 30px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #ccc; }
        #msg { color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>可用邮箱</h1>
    <div id="emailDisplay">加载中...</div>
    <br>
    <button id="copyBtn">点击复制并获取下一个</button>
    <div id="msg"></div>

    <script>
        // ===== 配置：改成你自己的 Worker 域名 =====
        const WORKER_URL = 'https://enail-proxy.pangdonglai88.workers.dev/emailPool.json';
        // =========================================

        let currentEmails = [];
        let pollingTimer = null;
        let isPending = false; // 防止重复提交

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }

        // 获取邮箱池
        async function fetchEmails() {
            try {
                const resp = await fetch(WORKER_URL);
                const data = await resp.json();
                currentEmails = Array.isArray(data) ? data : [];
                updateDisplay();
            } catch (e) {
                console.error('获取邮箱失败:', e);
            }
        }

        function updateDisplay() {
            const display = document.getElementById('emailDisplay');
            const btn = document.getElementById('copyBtn');
            if (currentEmails.length === 0) {
                display.textContent = '邮箱已用完';
                btn.disabled = true;
            } else {
                display.textContent = currentEmails[0];
                btn.disabled = false;
            }
        }

        // 删除第一个邮箱并提交
        async function removeFirstEmail() {
            if (isPending || currentEmails.length === 0) return;
            isPending = true;
            const removed = currentEmails[0];
            const newList = currentEmails.slice(1);
            try {
                const resp = await fetch(WORKER_URL, {
                    method: 'PUT',
                    body: JSON.stringify(newList),
                    headers: { 'Content-Type': 'application/json' }
                });
                if (resp.ok) {
                    currentEmails = newList;
                    updateDisplay();
                    document.getElementById('msg').textContent = `已复制并移除 ${removed}`;
                } else {
                    // 更新失败，可能被别人抢先了，重新拉取一次
                    await fetchEmails();
                    document.getElementById('msg').textContent = '稍等，正在同步...';
                }
            } catch (e) {
                document.getElementById('msg').textContent = '网络错误，请重试';
            }
            isPending = false;
        }

        // 复制按钮
        document.getElementById('copyBtn').addEventListener('click', async () => {
            if (currentEmails.length === 0) return;
            const email = currentEmails[0];
            await copyToClipboard(email);
            document.getElementById('msg').textContent = '已复制，正在删除...';
            await removeFirstEmail();
        });

        // 轮询同步（2 秒一次）
        function startPolling() {
            fetchEmails();
            pollingTimer = setInterval(fetchEmails, 2000);
        }

        startPolling();
    </script>
</body>
</html>
